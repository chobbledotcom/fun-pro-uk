media:
  input: images
  output: /images
  path: images
  categories:
    - image
settings:
  hide: true
  content:
    merge: true
content:
  - name: pages
    label: Pages
    path: pages
    type: collection
    subfolders: false
    exclude:
      - home.md
    view:
      fields:
        - permalink
        - meta_title
      primary: meta_title
      sort:
        - meta_title
    fields:
      - { name: subtitle, type: string, label: Subtitle }
      - { name: thumbnail, type: image, label: Thumbnail }
      - { name: body, type: rich-text, label: Body }
      - { name: meta_title, type: string, label: Meta Title, maxlength: 55 }
      - name: meta_description
        type: string
        label: Meta Description
        maxlength: 155
      - name: eleventyNavigation
        label: Navigation
        type: object
        fields:
          - { name: key, type: string }
          - { name: order, type: number }
      - { name: layout, type: string }
      - { name: no_index, type: boolean, label: Hide from listings }
      - name: videos
        label: Videos
        type: object
        list: true
        fields:
          - { name: id, type: string, label: YouTube Video ID, required: true }
          - { name: title, type: string, label: Title, required: true }
      - { name: permalink, type: string, label: Permalink }
      - { name: redirect_from, type: string, label: Redirect From, list: true }
      - name: faqs
        label: FAQs
        type: object
        list: true
        fields:
          - { name: question, type: string, label: Question, required: true }
          - { name: answer, type: string, label: Answer, required: true }
      - name: gallery
        type: image
        label: Gallery
        options:
          multiple: true
  - name: products
    label: Products
    path: products
    type: collection
    subfolders: false
    fields:
      - { name: title, type: string, label: Title }
      - { name: subtitle, type: string, label: Subtitle }
      - { name: thumbnail, type: image, label: Thumbnail }
      - { name: order, type: number, label: Order }
      - name: categories
        label: Categories
        type: reference
        options:
          collection: categories
          multiple: true
          search: title
          value: "{path}"
          label: "{title}"
      - name: events
        label: Events
        type: reference
        options:
          collection: events
          multiple: true
          search: title
          value: "{path}"
          label: "{title}"
      - name: options
        label: Product Options
        type: object
        list: true
        fields:
          - { name: name, type: string, label: Option Name, required: true }
          - name: max_quantity
            type: number
            label: Max Quantity
            default: 10
          - name: unit_price
            type: number
            label: Unit Price (£)
            required: true
          - { name: days, type: number, label: Days (for hire products) }
      - name: add_ons
        label: Add-ons
        type: object
        fields:
          - { name: intro, type: rich-text, label: Intro }
          - name: options
            label: Add-on Options
            type: object
            list: true
            fields:
              - { name: name, type: string, label: Name, required: true }
              - { name: price, type: number, label: Price, required: true }
      - { name: features, type: string, label: Features, list: true }
      - name: filter_attributes
        label: Filter Attributes
        type: object
        list: true
        fields:
          - { name: name, type: string, label: Name, required: true }
          - { name: value, type: string, label: Value, required: true }
      - { name: body, type: rich-text, label: Body }
      - { name: meta_title, type: string, label: Meta Title, maxlength: 55 }
      - name: meta_description
        type: string
        label: Meta Description
        maxlength: 155
      - { name: permalink, type: string, label: Permalink }
      - { name: redirect_from, type: string, label: Redirect From, list: true }
      - name: faqs
        label: FAQs
        type: object
        list: true
        fields:
          - { name: question, type: string, label: Question, required: true }
          - { name: answer, type: string, label: Answer, required: true }
      - name: gallery
        type: image
        label: Gallery
        options:
          multiple: true
      - name: specs
        label: Specifications
        type: object
        list: true
        fields:
          - { name: name, type: string, label: Name, required: true }
          - { name: value, type: string, label: Value, required: true }
      - name: tabs
        label: Tabs
        type: object
        list: true
        fields:
          - { name: title, type: string, label: Title, required: true }
          - { name: image, type: image, label: Image }
          - { name: body, type: rich-text, label: Body, required: true }
  - name: categories
    label: Categories
    path: categories
    type: collection
    subfolders: false
    filename: "{primary}.md"
    fields:
      - { name: title, type: string, label: Title }
      - { name: thumbnail, type: image, label: Thumbnail }
      - { name: body, type: rich-text, label: Body }
      - name: below_products
        type: rich-text
        label: Below Products Description
      - { name: featured, type: boolean, label: Featured }
      - { name: meta_title, type: string, label: Meta Title, maxlength: 55 }
      - name: meta_description
        type: string
        label: Meta Description
        maxlength: 155
      - { name: subtitle, type: string, label: Subtitle }
      - { name: permalink, type: string, label: Permalink }
      - { name: redirect_from, type: string, label: Redirect From, list: true }
      - name: faqs
        label: FAQs
        type: object
        list: true
        fields:
          - { name: question, type: string, label: Question, required: true }
          - { name: answer, type: string, label: Answer, required: true }
      - name: gallery
        type: image
        label: Gallery
        options:
          multiple: true
  - name: news
    label: News
    path: news
    type: collection
    subfolders: false
    fields:
      - { name: title, type: string, label: Title }
      - { name: date, label: Date, type: date }
      - name: author
        label: Author
        type: reference
        options:
          collection: team
          multiple: false
          search: title
          value: "{path}"
          label: "{title}"
      - { name: subtitle, type: string, label: Subtitle }
      - { name: body, type: rich-text, label: Body }
      - { name: meta_title, type: string, label: Meta Title, maxlength: 55 }
      - name: meta_description
        type: string
        label: Meta Description
        maxlength: 155
      - { name: no_index, type: boolean, label: Hide from listings }
      - { name: permalink, type: string, label: Permalink }
      - { name: redirect_from, type: string, label: Redirect From, list: true }
      - name: faqs
        label: FAQs
        type: object
        list: true
        fields:
          - { name: question, type: string, label: Question, required: true }
          - { name: answer, type: string, label: Answer, required: true }
      - name: gallery
        type: image
        label: Gallery
        options:
          multiple: true
  - name: events
    label: Events
    path: events
    type: collection
    subfolders: false
    filename: "{primary}.md"
    view:
      fields:
        - thumbnail
        - title
      primary: title
      sort:
        - title
    fields:
      - { name: title, type: string, label: Title }
      - { name: subtitle, type: string, label: Subtitle }
      - { name: thumbnail, type: image, label: Thumbnail }
      - { name: order, type: number, label: Order }
      - { name: body, type: rich-text, label: Body }
      - { name: meta_title, type: string, label: Meta Title, maxlength: 55 }
      - name: meta_description
        type: string
        label: Meta Description
        maxlength: 155
      - { name: permalink, type: string, label: Permalink }
      - { name: redirect_from, type: string, label: Redirect From, list: true }
      - name: faqs
        label: FAQs
        type: object
        list: true
        fields:
          - { name: question, type: string, label: Question, required: true }
          - { name: answer, type: string, label: Answer, required: true }
      - name: gallery
        type: image
        label: Gallery
        options:
          multiple: true
  - name: team
    label: Team
    path: team
    type: collection
    subfolders: false
    filename: "{primary}.md"
    fields:
      - { name: title, type: string, label: Title }
      - { name: thumbnail, type: image, label: Thumbnail }
      - { name: snippet, type: string, label: Role }
      - { name: image, type: image, label: Profile Image }
      - { name: body, type: rich-text, label: Biography }
      - { name: permalink, type: string, label: Permalink }
      - { name: redirect_from, type: string, label: Redirect From, list: true }
      - name: faqs
        label: FAQs
        type: object
        list: true
        fields:
          - { name: question, type: string, label: Question, required: true }
          - { name: answer, type: string, label: Answer, required: true }
      - name: gallery
        type: image
        label: Gallery
        options:
          multiple: true
  - name: reviews
    label: Reviews
    path: reviews
    type: collection
    subfolders: false
    fields:
      - { name: name, type: string, label: Name }
      - { name: url, type: string, label: URL }
      - { name: rating, type: number, label: Rating }
      - { name: thumbnail, type: image, label: Reviewer Photo }
      - { name: body, type: rich-text, label: Body }
      - name: products
        label: Products
        type: reference
        options:
          collection: products
          multiple: true
          search: title
          value: "{path}"
          label: "{title}"
      - { name: permalink, type: string, label: Permalink }
      - { name: redirect_from, type: string, label: Redirect From, list: true }
      - name: faqs
        label: FAQs
        type: object
        list: true
        fields:
          - { name: question, type: string, label: Question, required: true }
          - { name: answer, type: string, label: Answer, required: true }
  - name: locations
    label: Locations
    path: locations
    type: collection
    subfolders: true
    filename: "{primary}.md"
    view:
      fields:
        - thumbnail
        - title
        - subtitle
      primary: title
      sort:
        - title
    fields:
      - { name: title, type: string, label: Title }
      - { name: subtitle, type: string, label: Subtitle }
      - { name: thumbnail, type: image, label: Thumbnail }
      - { name: order, type: number, label: Order }
      - name: categories
        label: Categories
        type: reference
        options:
          collection: categories
          multiple: true
          search: title
          value: "{path}"
          label: "{title}"
      - { name: body, type: rich-text, label: Body }
      - { name: meta_title, type: string, label: Meta Title, maxlength: 55 }
      - name: meta_description
        type: string
        label: Meta Description
        maxlength: 155
      - { name: permalink, type: string, label: Permalink }
      - { name: redirect_from, type: string, label: Redirect From, list: true }
      - name: faqs
        label: FAQs
        type: object
        list: true
        fields:
          - { name: question, type: string, label: Question, required: true }
          - { name: answer, type: string, label: Answer, required: true }
      - name: gallery
        type: image
        label: Gallery
        options:
          multiple: true
  - name: snippets
    label: Snippets
    path: snippets
    type: collection
    subfolders: false
    filename: "{primary}.md"
    fields:
      - { name: name, type: string, label: Name }
      - { name: body, type: rich-text, label: Body }
  - name: site
    label: Site Configuration
    type: file
    path: _data/site.json
    fields:
      - { name: name, type: string, label: Site Name }
      - { name: url, type: string, label: Site URL }
      - name: opening_times
        label: Opening Times
        type: object
        list: true
        fields:
          - { name: day, type: string, label: Day, required: true }
          - { name: hours, type: string, label: Hours, required: true }
      - name: socials
        label: Social Media Links
        type: object
        fields:
          - { name: Github, type: string, label: Github }
          - { name: Forgejo, type: string, label: Forgejo }
          - { name: Facebook, type: string, label: Facebook }
          - { name: Instagram, type: string, label: Instagram }
          - { name: TikTok, type: string, label: TikTok }
          - { name: Google, type: string, label: Google }
          - { name: WhatsApp, type: string, label: WhatsApp }
          - { name: RSS, type: string, label: RSS }
      - { name: map_embed_src, type: string, label: Map Embed URL }
  - name: meta
    label: Meta Configuration
    type: file
    path: _data/meta.json
    fields:
      - { name: language, type: string, label: Language Code, default: en-GB }
      - name: organization
        label: Organization
        type: object
        fields:
          - { name: description, type: string, label: Organization Description }
          - { name: legalName, type: string, label: Legal Name }
          - { name: foundingDate, type: string, label: Founding Date }
          - name: founders
            label: Founders
            type: object
            list: true
            fields:
              - { name: name, type: string, label: Name }
          - name: address
            label: Address
            type: object
            fields:
              - { name: streetAddress, type: string, label: Street Address }
              - { name: addressLocality, type: string, label: City }
              - { name: addressRegion, type: string, label: Region/State }
              - { name: postalCode, type: string, label: Postal Code }
              - { name: addressCountry, type: string, label: Country Code }
          - name: contactPoint
            label: Contact Points
            type: object
            list: true
            fields:
              - { name: telephone, type: string, label: Telephone }
              - { name: contactType, type: string, label: Contact Type }
              - { name: areaServed, type: string, label: Area Served }
              - name: availableLanguage
                type: string
                label: Available Languages
                list: true
  - name: homepage
    label: Homepage
    type: file
    path: _data/homepage.json
    fields:
      - name: header
        label: Header
        type: object
        fields:
          - { name: subtitle, type: string, label: Subtitle }
          - { name: title, type: string, label: Title }
          - { name: button_text, type: string, label: Button Text }
          - { name: button_url, type: string, label: Button URL }
          - { name: all_categories_text, type: string, label: All Categories Text }
          - { name: all_categories_url, type: string, label: All Categories URL }
          - { name: all_categories_image, type: image, label: All Categories Image }
      - name: intro
        label: Intro Section
        type: object
        fields:
          - { name: title, type: string, label: Title }
          - { name: text, type: text, label: Text }
          - { name: button_text, type: string, label: Button Text }
          - { name: button_url, type: string, label: Button URL }
      - name: how_it_works
        label: How It Works
        type: object
        fields:
          - { name: title, type: string, label: Title }
          - { name: image, type: image, label: Image }
          - { name: button_text, type: string, label: Button Text }
          - { name: button_url, type: string, label: Button URL }
          - name: steps
            label: Steps
            type: object
            list: true
            fields:
              - { name: title, type: string, label: Title, required: true }
              - { name: text, type: string, label: Text, required: true }
      - name: popular_games
        label: Popular Games Section
        type: object
        fields:
          - { name: title, type: string, label: Title }
          - { name: link_text, type: string, label: Link Text }
          - { name: link_url, type: string, label: Link URL }
      - name: events
        label: Events Section
        type: object
        fields:
          - { name: title, type: string, label: Title }
  - name: alt-tags
    label: Image Alt Tags
    type: file
    path: _data/alt-tags.json
    fields:
      - name: images
        type: object
        list: true
        fields:
          - { name: path, type: image, label: Image }
          - { name: alt, type: string, label: Alt Text }
