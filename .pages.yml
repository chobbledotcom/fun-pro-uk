media:
  input: images
  output: /images
  path: images
  categories:
    - image
  rename: true
settings:
  hide: true
  content:
    merge: true
components:
  meta_title:
    type: string
    label: Meta Title
    options:
      maxlength: 55
  meta_description:
    type: string
    label: Meta Description
    options:
      maxlength: 155
  videos:
    label: Videos
    type: object
    list: true
    fields:
      - { name: id, type: string, label: YouTube Video ID, required: true }
      - { name: title, type: string, label: Title, required: true }
  block_section_header:
    label: Section Header
    type: object
    fields:
      - name: container_width
        type: string
        label: Container Width (full, wide, narrow)
      - { name: section_class, type: string, label: Section Class }
      - { name: intro, type: rich-text, label: Section Header Intro }
  block_features:
    label: Features
    type: object
    fields:
      - name: container_width
        type: string
        label: Container Width (full, wide, narrow)
      - { name: section_class, type: string, label: Section Class }
      - { name: grid_class, type: string, label: Grid Class }
      - { name: heading_level, type: number, label: Heading Level }
      - { name: header_intro, type: rich-text, label: Header Intro }
      - name: items
        type: object
        label: Features
        list: true
        fields:
          - name: icon
            type: string
            label: Icon (Iconify ID or HTML entity)
          - { name: title, type: string, label: Title, required: true }
          - name: description
            type: string
            label: Description
            required: true
          - { name: style, type: string, label: Custom Style }
  block_image_cards:
    label: Image Cards
    type: object
    fields:
      - name: container_width
        type: string
        label: Container Width (full, wide, narrow)
      - { name: section_class, type: string, label: Section Class }
      - { name: heading_level, type: number, label: Heading Level }
      - { name: image_aspect_ratio, type: string, label: Image Aspect Ratio }
      - { name: header_intro, type: rich-text, label: Header Intro }
      - name: items
        type: object
        label: Cards
        list: true
        fields:
          - { name: image, type: image, label: Image, required: true }
          - { name: title, type: string, label: Title, required: true }
          - { name: description, type: string, label: Description }
          - { name: link, type: string, label: Link URL }
  block_stats:
    label: Stats
    type: object
    fields:
      - name: container_width
        type: string
        label: Container Width (full, wide, narrow)
      - { name: section_class, type: string, label: Section Class }
      - name: items
        type: object
        label: Statistics
        list: true
        fields:
          - { name: value, type: string, label: Value, required: true }
          - { name: label, type: string, label: Label, required: true }
  block_code_block:
    label: Code Block
    type: object
    fields:
      - name: container_width
        type: string
        label: Container Width (full, wide, narrow)
      - { name: section_class, type: string, label: Section Class }
      - { name: filename, type: string, label: Filename, required: true }
      - { name: code, type: string, label: Code, required: true }
      - { name: language, type: string, label: Language }
  block_hero:
    label: Hero
    type: object
    fields:
      - name: container_width
        type: string
        label: Container Width (full, wide, narrow)
      - { name: section_class, type: string, label: Section Class }
      - { name: class, type: string, label: CSS Class }
      - { name: badge, type: string, label: Badge Text }
      - { name: title, type: string, label: Title, required: true }
      - { name: lead, type: string, label: Lead Text }
      - name: buttons
        type: object
        label: Buttons
        list: true
        fields:
          - { name: text, type: string, label: Button Text, required: true }
          - { name: href, type: string, label: URL, required: true }
          - { name: variant, type: string, label: Variant }
          - { name: size, type: string, label: Size }
  block_split_image:
    label: Split Image
    type: object
    fields:
      - name: container_width
        type: string
        label: Container Width (full, wide, narrow)
      - { name: section_class, type: string, label: Section Class }
      - { name: title, type: string, label: Title }
      - { name: title_level, type: number, label: Heading Level }
      - { name: subtitle, type: string, label: Subtitle }
      - { name: reverse, type: boolean, label: Reverse Layout }
      - { name: reveal_content, type: string, label: Reveal Content Animation }
      - { name: reveal_figure, type: string, label: Reveal Figure Animation }
      - { name: content, type: rich-text, label: Content }
      - name: button
        type: object
        label: Button
        fields:
          - { name: text, type: string, label: Button Text, required: true }
          - { name: href, type: string, label: URL, required: true }
          - { name: variant, type: string, label: Variant }
          - { name: size, type: string, label: Size }
      - { name: figure_src, type: image, label: Figure Image }
      - { name: figure_alt, type: string, label: Figure Alt Text }
      - { name: figure_caption, type: string, label: Figure Caption }
  block_split_video:
    label: Split Video
    type: object
    fields:
      - name: container_width
        type: string
        label: Container Width (full, wide, narrow)
      - { name: section_class, type: string, label: Section Class }
      - { name: title, type: string, label: Title }
      - { name: title_level, type: number, label: Heading Level }
      - { name: subtitle, type: string, label: Subtitle }
      - { name: reverse, type: boolean, label: Reverse Layout }
      - { name: reveal_content, type: string, label: Reveal Content Animation }
      - { name: reveal_figure, type: string, label: Reveal Figure Animation }
      - { name: content, type: rich-text, label: Content }
      - name: button
        type: object
        label: Button
        fields:
          - { name: text, type: string, label: Button Text, required: true }
          - { name: href, type: string, label: URL, required: true }
          - { name: variant, type: string, label: Variant }
          - { name: size, type: string, label: Size }
      - { name: figure_video_id, type: string, label: Video ID or URL }
      - { name: figure_alt, type: string, label: Video Alt Text }
      - { name: figure_caption, type: string, label: Video Caption }
  block_split_code:
    label: Split Code
    type: object
    fields:
      - name: container_width
        type: string
        label: Container Width (full, wide, narrow)
      - { name: section_class, type: string, label: Section Class }
      - { name: title, type: string, label: Title }
      - { name: title_level, type: number, label: Heading Level }
      - { name: subtitle, type: string, label: Subtitle }
      - { name: reverse, type: boolean, label: Reverse Layout }
      - { name: reveal_content, type: string, label: Reveal Content Animation }
      - { name: reveal_figure, type: string, label: Reveal Figure Animation }
      - { name: content, type: rich-text, label: Content }
      - name: button
        type: object
        label: Button
        fields:
          - { name: text, type: string, label: Button Text, required: true }
          - { name: href, type: string, label: URL, required: true }
          - { name: variant, type: string, label: Variant }
          - { name: size, type: string, label: Size }
      - { name: figure_filename, type: string, label: Code Filename }
      - { name: figure_code, type: string, label: Code Content }
      - { name: figure_language, type: string, label: Code Language }
  block_split_icon_links:
    label: Split Icon Links
    type: object
    fields:
      - name: container_width
        type: string
        label: Container Width (full, wide, narrow)
      - { name: section_class, type: string, label: Section Class }
      - { name: title, type: string, label: Title }
      - { name: title_level, type: number, label: Heading Level }
      - { name: subtitle, type: string, label: Subtitle }
      - { name: reverse, type: boolean, label: Reverse Layout }
      - { name: reveal_content, type: string, label: Reveal Content Animation }
      - { name: reveal_figure, type: string, label: Reveal Figure Animation }
      - { name: content, type: rich-text, label: Content }
      - name: button
        type: object
        label: Button
        fields:
          - { name: text, type: string, label: Button Text, required: true }
          - { name: href, type: string, label: URL, required: true }
          - { name: variant, type: string, label: Variant }
          - { name: size, type: string, label: Size }
      - name: figure_items
        type: object
        label: Links
        list: true
        fields:
          - name: icon
            type: string
            label: Icon (Iconify ID or HTML entity)
            required: true
          - { name: text, type: string, label: Link Text, required: true }
          - { name: url, type: string, label: URL }
  block_split_html:
    label: Split Html
    type: object
    fields:
      - name: container_width
        type: string
        label: Container Width (full, wide, narrow)
      - { name: section_class, type: string, label: Section Class }
      - { name: title, type: string, label: Title }
      - { name: title_level, type: number, label: Heading Level }
      - { name: subtitle, type: string, label: Subtitle }
      - { name: reverse, type: boolean, label: Reverse Layout }
      - { name: reveal_content, type: string, label: Reveal Content Animation }
      - { name: reveal_figure, type: string, label: Reveal Figure Animation }
      - { name: content, type: rich-text, label: Content }
      - name: button
        type: object
        label: Button
        fields:
          - { name: text, type: string, label: Button Text, required: true }
          - { name: href, type: string, label: URL, required: true }
          - { name: variant, type: string, label: Variant }
          - { name: size, type: string, label: Size }
      - { name: figure_html, type: rich-text, label: Figure HTML Content }
  block_split_callout:
    label: Split Callout
    type: object
    fields:
      - name: container_width
        type: string
        label: Container Width (full, wide, narrow)
      - { name: section_class, type: string, label: Section Class }
      - { name: title, type: string, label: Title }
      - { name: title_level, type: number, label: Heading Level }
      - { name: subtitle, type: string, label: Subtitle }
      - { name: reverse, type: boolean, label: Reverse Layout }
      - { name: reveal_content, type: string, label: Reveal Content Animation }
      - { name: reveal_figure, type: string, label: Reveal Figure Animation }
      - { name: content, type: rich-text, label: Content }
      - name: button
        type: object
        label: Button
        fields:
          - { name: text, type: string, label: Button Text, required: true }
          - { name: href, type: string, label: URL, required: true }
          - { name: variant, type: string, label: Variant }
          - { name: size, type: string, label: Size }
      - name: figure_icon
        type: string
        label: Icon (Iconify ID, emoji, or path)
      - name: figure_title
        type: string
        label: Callout Title
        required: true
      - { name: figure_subtitle, type: string, label: Callout Subtitle }
      - { name: figure_variant, type: string, label: Callout Color Variant }
  block_split_full:
    label: Split Full
    type: object
    fields:
      - name: container_width
        type: string
        label: Container Width (full, wide, narrow)
      - { name: section_class, type: string, label: Section Class }
      - { name: variant, type: string, label: Variant }
      - { name: title_level, type: number, label: Heading Level }
      - { name: reveal_left, type: string, label: Reveal Left Animation }
      - { name: reveal_right, type: string, label: Reveal Right Animation }
      - { name: left_title, type: string, label: Left Title }
      - { name: left_content, type: rich-text, label: Left Content }
      - name: left_button
        type: object
        label: Left Button
        fields:
          - { name: text, type: string, label: Button Text, required: true }
          - { name: href, type: string, label: URL, required: true }
          - { name: variant, type: string, label: Variant }
      - { name: right_title, type: string, label: Right Title }
      - { name: right_content, type: rich-text, label: Right Content }
      - name: right_button
        type: object
        label: Right Button
        fields:
          - { name: text, type: string, label: Button Text, required: true }
          - { name: href, type: string, label: URL, required: true }
          - { name: variant, type: string, label: Variant }
  block_cta:
    label: Cta
    type: object
    fields:
      - name: container_width
        type: string
        label: Container Width (full, wide, narrow)
      - { name: section_class, type: string, label: Section Class }
      - { name: title, type: string, label: Title, required: true }
      - { name: description, type: string, label: Description }
      - name: button
        type: object
        label: Button
        fields:
          - { name: text, type: string, label: Button Text, required: true }
          - { name: href, type: string, label: URL, required: true }
          - { name: variant, type: string, label: Variant }
          - { name: size, type: string, label: Size }
  block_video_background:
    label: Video Background
    type: object
    fields:
      - name: container_width
        type: string
        label: Container Width (full, wide, narrow)
      - { name: section_class, type: string, label: Section Class }
      - { name: video_id, type: string, label: Video Embed URL, required: true }
      - { name: thumbnail_url, type: string, label: Thumbnail URL }
      - { name: video_title, type: string, label: Video Title }
      - { name: aspect_ratio, type: string, label: Aspect Ratio }
      - { name: class, type: string, label: CSS Class }
      - { name: content, type: rich-text, label: Overlay Content }
  block_bunny_video_background:
    label: Bunny Video Background
    type: object
    fields:
      - name: container_width
        type: string
        label: Container Width (full, wide, narrow)
      - { name: section_class, type: string, label: Section Class }
      - name: video_url
        type: string
        label: Bunny Stream Embed URL
        required: true
      - name: thumbnail_url
        type: string
        label: Thumbnail URL
        required: true
      - { name: video_title, type: string, label: Video Title }
      - { name: aspect_ratio, type: string, label: Aspect Ratio }
      - { name: class, type: string, label: CSS Class }
      - { name: content, type: rich-text, label: Overlay Content }
  block_image_background:
    label: Image Background
    type: object
    fields:
      - name: container_width
        type: string
        label: Container Width (full, wide, narrow)
      - { name: section_class, type: string, label: Section Class }
      - { name: image, type: image, label: Background Image, required: true }
      - { name: image_alt, type: string, label: Image Alt Text }
      - { name: parallax, type: boolean, label: Parallax }
      - { name: class, type: string, label: CSS Class }
      - { name: content, type: rich-text, label: Overlay Content }
  block_items:
    label: Items
    type: object
    fields:
      - name: container_width
        type: string
        label: Container Width (full, wide, narrow)
      - { name: section_class, type: string, label: Section Class }
      - name: collection
        type: string
        label: Collection Name
        required: true
      - { name: intro, type: rich-text, label: Intro Content (Markdown) }
      - { name: horizontal, type: boolean, label: Horizontal Slider }
      - { name: masonry, type: boolean, label: Masonry Grid }
      - { name: header_intro, type: rich-text, label: Header Intro }
      - name: filter
        type: object
        label: Filter
        fields:
          - name: property
            type: string
            label: Property (e.g. url, data.title)
          - { name: includes, type: string, label: Contains }
          - { name: equals, type: string, label: Equals }
  block_items_array:
    label: Items Array
    type: object
    fields:
      - name: container_width
        type: string
        label: Container Width (full, wide, narrow)
      - { name: section_class, type: string, label: Section Class }
      - { name: items, type: string, label: Items, required: true, list: true }
      - { name: intro, type: rich-text, label: Intro Content (Markdown) }
      - { name: horizontal, type: boolean, label: Horizontal Slider }
      - { name: masonry, type: boolean, label: Masonry Grid }
  block_contact_form:
    label: Contact Form
    type: object
    fields:
      - name: container_width
        type: string
        label: Container Width (full, wide, narrow)
      - { name: section_class, type: string, label: Section Class }
      - { name: content, type: rich-text, label: Content }
  block_custom_contact_form:
    label: Custom Contact Form
    type: object
    fields:
      - name: container_width
        type: string
        label: Container Width (full, wide, narrow)
      - { name: section_class, type: string, label: Section Class }
      - name: fields
        type: object
        label: Form Fields
        list: true
        fields:
          - { name: name, type: string, label: Field Name, required: true }
          - { name: label, type: string, label: Field Label, required: true }
          - name: type
            type: string
            label: Field Type (text, email, tel, textarea, select, radio, heading)
          - { name: placeholder, type: string, label: Placeholder }
          - { name: required, type: boolean, label: Required }
          - { name: rows, type: number, label: Rows (for textarea) }
          - { name: note, type: string, label: Help Note }
          - { name: fieldClass, type: string, label: CSS Class }
      - { name: content, type: rich-text, label: Intro Content }
      - { name: header_intro, type: rich-text, label: Header Intro }
  block_markdown:
    label: Markdown
    type: object
    fields:
      - name: container_width
        type: string
        label: Container Width (full, wide, narrow)
      - { name: section_class, type: string, label: Section Class }
      - { name: content, type: rich-text, label: Markdown }
  block_html:
    label: Html
    type: object
    fields:
      - name: container_width
        type: string
        label: Container Width (full, wide, narrow)
      - { name: section_class, type: string, label: Section Class }
      - { name: content, type: string, label: Raw HTML, required: true }
  block_content:
    label: Content
    type: object
    fields:
      - name: container_width
        type: string
        label: Container Width (full, wide, narrow)
      - { name: section_class, type: string, label: Section Class }
  block_include:
    label: Include
    type: object
    fields:
      - name: container_width
        type: string
        label: Container Width (full, wide, narrow)
      - { name: section_class, type: string, label: Section Class }
      - { name: file, type: string, label: Template File Path, required: true }
  block_properties:
    label: Properties
    type: object
    fields:
      - name: container_width
        type: string
        label: Container Width (full, wide, narrow)
      - { name: section_class, type: string, label: Section Class }
  block_guide_categories:
    label: Guide Categories
    type: object
    fields:
      - name: container_width
        type: string
        label: Container Width (full, wide, narrow)
      - { name: section_class, type: string, label: Section Class }
  block_link_button:
    label: Link Button
    type: object
    fields:
      - name: container_width
        type: string
        label: Container Width (full, wide, narrow)
      - { name: section_class, type: string, label: Section Class }
      - { name: text, type: string, label: Button Text, required: true }
      - { name: href, type: string, label: URL, required: true }
      - { name: variant, type: string, label: Variant }
      - { name: size, type: string, label: Size }
      - { name: reveal, type: string, label: Reveal Animation }
  block_reviews:
    label: Reviews
    type: object
    fields:
      - name: container_width
        type: string
        label: Container Width (full, wide, narrow)
      - { name: section_class, type: string, label: Section Class }
      - { name: current_item, type: boolean, label: Filter to Current Item }
  block_gallery:
    label: Gallery
    type: object
    fields:
      - name: container_width
        type: string
        label: Container Width (full, wide, narrow)
      - { name: section_class, type: string, label: Section Class }
      - { name: aspect_ratio, type: string, label: Aspect Ratio }
      - name: items
        type: object
        label: Gallery Images
        list: true
        fields:
          - { name: image, type: image, label: Image, required: true }
          - { name: caption, type: string, label: Caption }
  block_marquee_images:
    label: Marquee Images
    type: object
    fields:
      - name: container_width
        type: string
        label: Container Width (full, wide, narrow)
      - { name: section_class, type: string, label: Section Class }
      - name: items
        type: object
        label: Images
        list: true
        fields:
          - { name: image, type: string, label: Image Path, required: true }
          - { name: alt, type: string, label: Alt Text }
          - { name: link_url, type: string, label: Link URL }
      - { name: speed, type: string, label: Scroll Speed (e.g. 30s) }
      - { name: height, type: string, label: Image Height (e.g. 50px) }
  block_icon_links:
    label: Icon Links
    type: object
    fields:
      - name: container_width
        type: string
        label: Container Width (full, wide, narrow)
      - { name: section_class, type: string, label: Section Class }
      - { name: intro, type: rich-text, label: Intro Content (Markdown) }
      - name: items
        type: object
        label: Links
        list: true
        fields:
          - name: icon
            type: string
            label: Icon (Iconify ID or HTML entity)
            required: true
          - { name: text, type: string, label: Link Text, required: true }
          - { name: url, type: string, label: URL }
  block_snippet:
    label: Snippet
    type: object
    fields:
      - name: container_width
        type: string
        label: Container Width (full, wide, narrow)
      - { name: section_class, type: string, label: Section Class }
      - name: reference
        label: Snippet
        type: reference
        list: true
        options:
          search: primary
          value: "{path}"
          label: "{primary}"
  faqs:
    label: FAQs
    type: object
    list: true
    fields:
      - { name: question, type: string, label: Question, required: true }
      - { name: answer, type: string, label: Answer, required: true }
  gallery:
    type: image
    label: Gallery
    options:
      multiple: true
  specs:
    label: Specifications
    type: object
    list: true
    fields:
      - { name: name, type: string, label: Name, required: true }
      - { name: value, type: string, label: Value, required: true }
  tabs:
    label: Tabs
    type: object
    list: true
    fields:
      - { name: title, type: string, label: Title, required: true }
      - { name: image, type: image, label: Image }
      - { name: body, type: rich-text, label: Body, required: true }
  products_list:
    label: Products
    type: object
    list: true
    fields:
      - name: product
        label: Product
        type: reference
        options:
          collection: products
          search: primary
          value: "{path}"
          label: "{primary}"
content:
  - name: pages
    label: Pages
    path: pages
    type: collection
    subfolders: false
    filename: "{primary}.md"
    view:
      fields:
        - permalink
        - meta_title
      primary: meta_title
      sort:
        - meta_title
    fields:
      - { name: subtitle, type: string, label: Subtitle }
      - { name: body, type: rich-text, label: Body }
      - { name: meta_title, component: meta_title }
      - { name: meta_description, component: meta_description }
      - name: eleventyNavigation
        label: Navigation
        type: object
        fields:
          - { name: key, type: string }
          - { name: order, type: number }
      - { name: layout, type: string }
      - { name: no_index, type: boolean, label: Hide from listings }
      - { name: videos, component: videos }
      - name: blocks
        label: Content Blocks
        type: block
        list: true
        blockKey: type
        blocks:
          - { name: section-header, component: block_section_header }
          - { name: features, component: block_features }
          - { name: image-cards, component: block_image_cards }
          - { name: stats, component: block_stats }
          - { name: code-block, component: block_code_block }
          - { name: hero, component: block_hero }
          - { name: split-image, component: block_split_image }
          - { name: split-video, component: block_split_video }
          - { name: split-code, component: block_split_code }
          - { name: split-icon-links, component: block_split_icon_links }
          - { name: split-html, component: block_split_html }
          - { name: split-callout, component: block_split_callout }
