{%- comment -%}
Search box component for product keyword search in header.
{%- endcomment -%}

<noscript><p>JavaScript is required to search.</p></noscript>
<form action="/search/" method="get" class="search-box" id="nav-search">
  <input
    list="keywords"
    name="q"
    placeholder="Search products..."
    autocomplete="off"
  >
  <datalist id="keywords">
    {%- for keyword in collections.searchKeywords -%}
      <option value="{{ keyword }}">
    {%- endfor -%}
  </datalist>
  <button type="submit" aria-label="Search">
    <svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M19.7556 18.5778L14.5682 13.3904C15.6812 11.9777 16.3337 10.2128 16.3337 8.29687C16.3337 3.72236 12.6808 0 8.19029 0C3.69978 0 0.046875 3.72236 0.046875 8.29687C0.046875 12.8714 3.69978 16.5938 8.19029 16.5938C10.0616 16.5938 11.7867 15.9703 13.1777 14.9063L18.3789 20.1074C18.5693 20.2979 18.8169 20.3932 19.0644 20.3932C19.312 20.3932 19.5596 20.2979 19.75 20.1074C20.1364 19.7266 20.1364 19.0156 19.7556 18.5778ZM8.19029 14.7656C4.69775 14.7656 1.875 11.8721 1.875 8.29687C1.875 4.72168 4.69775 1.82812 8.19029 1.82812C11.6828 1.82812 14.5056 4.72168 14.5056 8.29687C14.5056 11.8721 11.6828 14.7656 8.19029 14.7656Z" fill="currentColor"/>
    </svg>
  </button>
  <p class="search-error">Please select a keyword from the list.</p>
</form>
