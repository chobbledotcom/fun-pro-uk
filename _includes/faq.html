{%- if faqs.size > 0 -%}
  <div class="faqs-container">
    <h2>Frequently Asked Questions</h2>
    <dl class="faqs">
      {%- for faq in faqs -%}
      <details>
        <summary>{{ faq.question }}</summary>
        <p>{{ faq.answer }}</p>
      </details>
      {%- endfor -%}
    </dl>
  </div>
{%- endif -%}
