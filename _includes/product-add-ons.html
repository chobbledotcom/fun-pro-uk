<div class="add-ons full-width">
  <div class="inner">
    {% renderTemplate "md" %}{{ add_ons.intro }}{% endrenderTemplate %}
    <ul>
      {%- for add_on_option in add_ons.options -%}
        <li>
          <strong>{{ add_on_option.name }}</strong>
          <span class="price">
            £{{ add_on_option.price }}
            <small>+ VAT</small>
          </span>
        </li>
      {%- endfor -%}
    </ul>
  </div>
</div>
