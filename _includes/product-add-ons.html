<div id="add-ons" class="add-ons full-width">
  <div class="inner" id="branding">
    {{ add_ons.intro | renderContent: "md"  }}
    <ul>
      {%- for add_on_option in add_ons.options -%}
        <li>
          <strong>{{ add_on_option.name }}</strong>
          <span class="price">
            £{{ add_on_option.price }}
            <small>+ VAT</small>
          </span>
        </li>
      {%- endfor -%}
    </ul>
  </div>
</div>
