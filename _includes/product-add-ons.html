<div class="add-ons full-width">
  <div class="inner">
    {{ add_ons.intro }}
    <ul>
      {%- for option in add_ons.options -%}
        <li>
          <strong>{{ option.name }}</strong>
          <span class="price">
            £{{ option.price }}
            <small>+ VAT</small>
          </span>
        </li>
      {%- endfor -%}
    </ul>
  </div>
</div>
