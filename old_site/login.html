		<script type="text/javascript">
			var lockedContainer = d3.select('div#LockedOutMessage');
			var customerID = lockedContainer.attr('data-cid');

			if (customerID > 1) {
				d3.json('https://central.web1.bookingonline.co.uk/api/LockArrears/GetPaymentbyCustomerID/?cid=' + customerID).then(function (data) {
					if (data.length > 0) {
						var para = lockedContainer.append('p').text('There are currently outstanding payments against your account. If you are locked out, you can make the following payments to unlock your account.');
						var listofPayments = para.append('ul');
						listofPayments.selectAll("*").remove();
						listofPayments.selectAll("li").data(data).enter().append('li').each(function (d) { d3.select(this).html('<a href="https://www.bouncycastlenetwork.com/pay/' + d.PaymentGuid + '" target="_blank">' + d.RawContent + ' (' + getSymbol(d.CurrencyCharged) + d.PricePaid + ')' + '</a>') });
						lockedContainer.append('div').html('<div class="text-center"><p><a class="btn btn-warning fullwidth" href="login.html">Recheck Payments</a></p></div>');

					}
				}, function (error) {
					//lockedContainer.append('p').text('Error finding customer information. Please submit a support ticket to Booking Online.');
				});
			}

			function getSymbol(CurrencyCharged) {
				var currencySymbol = "£";
				if (CurrencyCharged == 1)
					currencySymbol = "€";
				if (CurrencyCharged == 2)
					currencySymbol = "$";

				return currencySymbol;
			}
		</script>
